name: ai_orchestration_billing
version: "1.0.0"
config-version: 2

profile: ai_orchestration_billing

model-paths: ["models"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ai_orchestration_billing:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: reporting

seeds:
  ai_orchestration_billing:
    +schema: seed_data
    ai_orchestration_events:
      +column_types:
        credits_consumed: float
    ai_orchestration_credit_allocations:
      +column_types:
        credits_allocated: float
