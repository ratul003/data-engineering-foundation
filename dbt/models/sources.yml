version: 2

sources:
  - name: opal_raw
    description: >
      Raw Opal usage data landing in the RAW layer. In production this is populated
      by Segment (events) and Fivetran (account/billing records). In this demo project
      the source tables are backed by seeds in seeds/.
    schema: seed_data
    tables:
      - name: opal_events
        description: Row-level Opal tool and agent usage events from Segment track() calls.
        loaded_at_field: _loaded_at
        freshness:
          warn_after: { count: 3, period: hour }
          error_after: { count: 12, period: hour }
        columns:
          - name: event_id
            description: Surrogate key — SHA-256 of (account_id, user_id, received_at, tool_name).
            tests:
              - not_null
              - unique
          - name: event_name
            tests:
              - not_null
              - accepted_values:
                  values: ["AGENT_EXECUTED", "TOOL_CALLED", "WORKFLOW_RUN"]
          - name: account_id
            tests:
              - not_null
          - name: credits_consumed
            description: Credits consumed by this event. Always >= 0.
            tests:
              - not_null

      - name: opal_accounts
        description: Account master — one row per account. Updated nightly via Fivetran.
        columns:
          - name: account_id
            tests:
              - not_null
              - unique
          - name: plan_type
            tests:
              - accepted_values:
                  values: ["starter", "growth", "enterprise"]
          - name: status
            tests:
              - accepted_values:
                  values: ["active", "churned", "suspended"]

      - name: opal_credit_allocations
        description: Monthly credit allocations per account per billing period.
        columns:
          - name: allocation_id
            tests:
              - not_null
              - unique
          - name: account_id
            tests:
              - not_null
              - relationships:
                  to: source('opal_raw', 'opal_accounts')
                  field: account_id

  - name: segment_raw
    description: >
      Raw Segment identify() and group() calls landing in the RAW layer via Segment's
      Snowflake destination. This is the source of the identity resolution layer.
    schema: seed_data
    tables:
      - name: segment_identifies
        description: >
          One row per identify() call — fires on login and profile update.
          The alias_id column carries the MCID that was aliased to this userId.
        columns:
          - name: message_id
            tests:
              - not_null
              - unique
          - name: user_id
            tests:
              - not_null
