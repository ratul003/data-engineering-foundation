version: 2

models:
  - name: int_ai_orchestration_daily_usage
    description: >
      Daily credit consumption per account. Joins events to accounts so plan_type
      and monthly_credit_limit travel with each row — downstream billing models
      don't need to re-join accounts.
    columns:
      - name: event_date
        tests:
          - not_null
      - name: account_id
        tests:
          - not_null
      - name: credits_consumed
        tests:
          - not_null

  - name: int_ai_orchestration_account_balances
    description: >
      Per-period credit consumption vs allocation. One row per (account, billing period).
      credits_overages is always >= 0 — the source of truth for overage billing.
    columns:
      - name: allocation_id
        tests:
          - not_null
          - unique
      - name: credits_remaining
        description: May be negative — clamped to zero in the mart layer.
      - name: credits_overages
        description: Amount consumed beyond the allocation. Zero if within limit.

  - name: int_identity_resolution
    description: >
      Resolved user-to-account mapping. One row per user_id. The original_mcid
      column preserves the anonymous ID that was aliased to this user at login,
      enabling pre-auth event attribution.
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: account_id
        description: Latest account association. Null if the user has never called group().
